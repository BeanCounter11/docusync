name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI (TypeScript)
        run: npm run build

      - name: Build GitHub Action bundle (ncc)
        run: npm run build:action

      - name: Run tests
        run: npm test

      - name: Verify action entry exists
        run: test -f dist/index.js
